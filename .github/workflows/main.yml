name: CI/CD Pipeline - VV&T Códigos Sequenciais

"on":
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: food_codes
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: food_codes

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências Python
        run: |
          pip install --upgrade pip
          pip install mysql-connector-python pytest

      - name: Instalar cliente MySQL
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Aguardar MySQL ficar disponível
        run: |
          echo "Aguardando MySQL..."
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -proot --silent; then
              echo "MySQL disponível!"
              break
            fi
            echo "Tentativa $i/30 - aguardando..."
            sleep 3
          done

      - name: Criar banco de dados e tabela (setup.sql)
        run: |
          mysql -h 127.0.0.1 -u root -proot < setup.sql
          echo "Banco de dados e tabela criados com sucesso."

      - name: Verificar dados iniciais no banco
        run: |
          mysql -h 127.0.0.1 -u root -proot food_codes \
            -e "SELECT * FROM codigos_sequenciais ORDER BY id;"

      - name: Executar testes com pytest
        run: pytest test_code_generator.py -v --tb=short

      - name: Consultar dados finais no banco (evidência)
        if: always()
        run: |
          mysql -h 127.0.0.1 -u root -proot food_codes \
            -e "SELECT * FROM codigos_sequenciais ORDER BY id;"